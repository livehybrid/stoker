# Stoker control-plane swarm stack (deploy via deploy.py -> Portainer).
#
# - stoker:    the FastAPI control plane + built UI (unpinned; state lives in
#              Postgres and /mnt/aios, so any node runs it).
# - db:        Postgres 16, pinned to hpelite, data on a local bind (off gluster).
# - db-backup: tiredofit/db-backup (timestamped dumps + retention), house pattern.
#
# The master key is a swarm secret (file mount, never env). The DB password,
# Portainer token and dogfood HEC token are injected as env by deploy.py from
# this dir's .env. Access this stage: the published port on the LAN (:8091) and,
# once DNS for the host exists, the Traefik router.
version: "3.8"

services:
  stoker:
    image: ghcr.io/livehybrid/stoker:latest
    networks: [traefik_default, stoker_internal]
    ports:
      - "8091:8080"        # LAN access this stage (a public host needs DNS + auth)
    volumes:
      - stoker_bundles:/data/bundles   # content-addressed bundle tarballs
      - stoker_repos:/data/repos       # git clones
    secrets:
      - stoker_master_key
    environment:
      - DATABASE_URL=postgresql+psycopg://stoker:${STOKER_DB_PASSWORD}@db:5432/stoker
      - STOKER_MASTER_KEY_FILE=/run/secrets/stoker_master_key
      - PUBLIC_BASE_URL=${STOKER_PUBLIC_BASE_URL}
      - WORKER_IMAGE=${STOKER_WORKER_IMAGE}
      - PORTAINER_HOST=${PORTAINER_HOST}
      - PORTAINER_TOKEN=${PORTAINER_TOKEN}       # tier-0, accepted env exposure
      - PORTAINER_ENDPOINT=6
      - BUNDLE_DIR=/data/bundles
      - REPO_CLONE_DIR=/data/repos
      - DOGFOOD_HEC_URL=${DOGFOOD_HEC_URL}
      - DOGFOOD_HEC_TOKEN=${DOGFOOD_HEC_TOKEN}
      # App-level auth (replaces the Traefik basic-auth stopgap below). All are
      # optional: unset => first-web-visit setup screen creates the first admin.
      # STOKER_ADMIN_* seed a default admin; STOKER_TRUSTED_PROXIES + AUTH_HEADER
      # enable trusted-proxy SSO (Traefik forward-auth to authentik or anything).
      - STOKER_ADMIN_USER=${STOKER_ADMIN_USER:-}
      - STOKER_ADMIN_PASSWORD=${STOKER_ADMIN_PASSWORD:-}
      - STOKER_TRUSTED_PROXIES=${STOKER_TRUSTED_PROXIES:-}
      - STOKER_AUTH_HEADER=${STOKER_AUTH_HEADER:-X-Forwarded-User}
      - STOKER_PROXY_DEFAULT_ROLE=${STOKER_PROXY_DEFAULT_ROLE:-operator}
      - STOKER_SESSION_TTL=${STOKER_SESSION_TTL:-43200}
      # Advanced overrides — all optional; server/config.py holds the defaults, so
      # an unset var (empty here) just uses that default. See .env.example.
      - STOKER_JWT_TTL_S=${STOKER_JWT_TTL_S:-}
      - METRIC_ROLLUP_AFTER_H=${METRIC_ROLLUP_AFTER_H:-}
      - METRIC_PRUNE_AFTER_D=${METRIC_PRUNE_AFTER_D:-}
      - METRIC_ROLLUP_BUCKET_S=${METRIC_ROLLUP_BUCKET_S:-}
      - METRIC_MAINTENANCE_INTERVAL_S=${METRIC_MAINTENANCE_INTERVAL_S:-}
      - METRIC_DELETE_CHUNK=${METRIC_DELETE_CHUNK:-}
      - DOGFOOD_METRICS_INTERVAL_S=${DOGFOOD_METRICS_INTERVAL_S:-}
      - DOGFOOD_GZIP=${DOGFOOD_GZIP:-}
      # rawreplay (Piston) dataset_url fetch caps (note: no STOKER_ prefix).
      - RAWREPLAY_MAX_DATASET_BYTES=${RAWREPLAY_MAX_DATASET_BYTES:-}
      - RAWREPLAY_FETCH_TIMEOUT_S=${RAWREPLAY_FETCH_TIMEOUT_S:-}
    stop_grace_period: 45s
    deploy:
      replicas: 1
      # Pinned to hpelite this stage so its named volumes (bundles/repos) stay
      # put; relax once bundles move to shared storage.
      placement: {constraints: ["node.hostname == hpelite"]}
      restart_policy: {condition: on-failure}
      labels:
        # Router split per the design. Router 1 (UI + operator/admin API) is
        # protected by Stoker's own APP-LEVEL auth (local users + trusted-proxy
        # SSO; see the STOKER_* env above) — the old Traefik basic-auth stopgap
        # has been removed, so there is no basic-auth here. Router 2 (/api/agent +
        # /api/hooks) bypasses browser auth at higher priority: workers and GitHub
        # cannot log in, and those paths are protected by the per-run JWT and the
        # webhook HMAC (Stoker also exempts them from its own session guard).
        #
        # For SSO, put Traefik forward-auth (middlewares=authentik@docker) on this
        # router instead of basic-auth, set STOKER_TRUSTED_PROXIES to the proxy's
        # network and STOKER_AUTH_HEADER to the header it injects; Stoker then
        # trusts that header only from the proxy peer.
        - traefik.enable=true
        - traefik.http.routers.stoker.entrypoints=websecure
        - traefik.http.routers.stoker.tls=true
        - traefik.http.routers.stoker.rule=Host(`${STOKER_HOST:-stoker.mydomain.com}`)
        # No Traefik basic-auth: Stoker's own app-level auth (local users +
        # trusted-proxy SSO) guards the UI/ops API. For forward-auth SSO, add
        # middlewares=authentik@docker here and set STOKER_TRUSTED_PROXIES.
        - traefik.http.routers.stoker-agent.entrypoints=websecure
        - traefik.http.routers.stoker-agent.tls=true
        - traefik.http.routers.stoker-agent.priority=100
        - traefik.http.routers.stoker-agent.rule=Host(`${STOKER_HOST:-stoker.mydomain.com}`) && (PathPrefix(`/api/agent`) || PathPrefix(`/api/hooks`))
        # Rate-limit the open agent/webhook paths (internet-exposed, no basic-auth).
        - traefik.http.routers.stoker-agent.middlewares=stoker-ratelimit
        - traefik.http.middlewares.stoker-ratelimit.ratelimit.average=200
        - traefik.http.middlewares.stoker-ratelimit.ratelimit.burst=400
        - traefik.http.services.stoker.loadbalancer.server.port=8080

  db:
    image: postgres:16
    networks: [stoker_internal]
    environment:
      - POSTGRES_DB=stoker
      - POSTGRES_USER=stoker
      - POSTGRES_PASSWORD=${STOKER_DB_PASSWORD}
    volumes:
      - stoker_pgdata:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement: {constraints: ["node.hostname == hpelite"]}   # pinned: data locality

  db-backup:
    image: tiredofit/db-backup
    networks: [stoker_internal]
    environment:
      - DB01_TYPE=pgsql
      - DB01_HOST=db
      - DB01_NAME=stoker
      - DB01_USER=stoker
      - DB01_PASS=${STOKER_DB_PASSWORD}
      - DB01_PORT=5432
    volumes:
      - stoker_backups:/backup
    deploy:
      replicas: 1
      placement: {constraints: ["node.hostname == hpelite"]}

secrets:
  stoker_master_key:
    external: true          # created by deploy.py (ensure_master_key_secret)

volumes:
  stoker_pgdata: {}
  stoker_bundles: {}
  stoker_repos: {}
  stoker_backups: {}

networks:
  traefik_default: {external: true}
  stoker_internal: {driver: overlay}
