name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  IMAGE_NAME: ghcr.io/livehybrid/stoker-worker

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r worker/requirements.txt
          pip install pytest pytest-timeout

      - name: Unit tests (agent)
        run: python -m pytest worker/tests -q

      - name: Unit tests (tools and packs)
        run: python -m pytest tools/tests -q --timeout=60

      # Real-engine checks run on 3.9 only (the image's runtime python).
      - name: Vendored engine import check
        id: engine
        if: matrix.python-version == '3.9'
        run: |
          if PYTHONPATH=worker/engines/eventgen python -c "import splunk_eventgen"; then
            echo "ok=1" >> "$GITHUB_OUTPUT"
          else
            echo "ok=0" >> "$GITHUB_OUTPUT"
            echo "::warning title=Real-engine smoke skipped::vendored splunk_eventgen failed to import on py3.9; fix the vendored tree before Phase 0 exit"
          fi

      - name: Standalone agent smoke (real engine, 5 s at 50 EPS)
        if: matrix.python-version == '3.9' && steps.engine.outputs.ok == '1'
        run: RATE=50 DURATION_S=5 TOLERANCE_PCT= tools/smoke.sh local

  server-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install -r worker/requirements.txt
          pip install pytest pytest-timeout

      # Control-plane suite, including the real-worker end-to-end test that
      # drives the vendored agent subprocess through claim -> T0 -> final.
      - name: Control-plane tests
        run: python -m pytest server/tests -q --timeout=180

  build:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          file: worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pushed image (amd64)
        run: docker pull --platform linux/amd64 "${IMAGE_NAME}@${{ needs.build.outputs.digest }}"

      - name: Container smoke (20 s at 100 EPS, within 10 percent of 2000)
        run: RATE=100 DURATION_S=20 TOLERANCE_PCT=10 tools/smoke.sh docker "${IMAGE_NAME}@${{ needs.build.outputs.digest }}"

  sign:
    needs: [build, smoke]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Keyless sign the pushed digest
        run: cosign sign --yes "${IMAGE_NAME}@${{ needs.build.outputs.digest }}"
