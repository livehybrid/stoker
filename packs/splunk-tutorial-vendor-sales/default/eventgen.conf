# splunk-tutorial-vendor-sales: vendor_sales.log (Splunk Search Tutorial shape,
# sourcetype vendor_sales). The worker rewrites interval/count (or perDayVolume)
# for its share. Output-side keys (index/sourcetype/host/source) are stamped by
# the agent from the run slice, never set here.

[tutorial_vendor_sales.sample]
mode = sample
interval = 60
count = 1500
randomizeCount = 0.2
earliest = -60s
latest = now

# Timestamp: [DD/Mon/YYYY:HH:MM:SS]. Rewrite the inner datetime to now; the
# brackets stay literal in the sample.
token.0.token = \d{2}/\w{3}/\d{4}:\d{2}:\d{2}:\d{2}
token.0.replacementType = timestamp
token.0.replacement = %d/%b/%Y:%H:%M:%S

# VendorID: re-randomise across the 4-digit vendor id range.
token.1.token = VendorID=(\d+)
token.1.replacementType = random
token.1.replacement = integer[1000:9999]

# AcctID: a fresh 16-digit account number per emitted sale.
token.2.token = AcctID=(\d+)
token.2.replacementType = random
token.2.replacement = integer[1000000000000000:9999999999999999]
