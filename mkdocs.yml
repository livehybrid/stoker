site_name: Stoker
site_description: Control plane and web UI for orchestrating Splunk HEC data-generator fleets
site_url: https://livehybrid.github.io/stoker/
repo_url: https://github.com/livehybrid/stoker
repo_name: livehybrid/stoker
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.action.edit
    - search.suggest

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Worker contract: WORKER-CONTRACT.md
  - Control plane: control-plane.md
  - Packs: PACKS.md
  - Integration harness: harness.md
  - Phase 0 review: PHASE0-REVIEW.md
