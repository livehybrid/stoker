# Stoker Alembic config (for authoring delta migrations at dev time:
#   alembic revision --autogenerate -m "add X"
#   alembic history / alembic upgrade --sql
# ). The APP boots migrations itself via server.db.init_db ->
# server.migrate.run_migrations; this file is not used at runtime.
[alembic]
script_location = server/migrations
prepend_sys_path = .
# Left blank: env.py resolves the URL from Stoker settings (STOKER DATABASE_URL)
# when unset. Set it (or pass -x) to autogenerate against a specific database.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
